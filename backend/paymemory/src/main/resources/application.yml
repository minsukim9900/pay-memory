spring:
  config:
    import:
      - optional:file:.env[.properties]

  application:
    name: pay-memory

  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/${POSTGRES_DB:pay_memory}
    username: ${POSTGRES_USER:postgres}
    password: ${POSTGRES_PASSWORD:1234}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 3000ms

    mongodb:
      uri: mongodb://${MONGODB_USERNAME:admin}:${MONGODB_PASSWORD:mongodb_password}@${MONGODB_HOST:localhost}:${MONGODB_PORT:27017}/${MONGODB_DATABASE:paymemory}?authSource=${MONGODB_AUTH_DATABASE:admin}

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    properties:
      hibernate:
        show_sql: false
        format_sql: true
        use_sql_comments: false
        highlight_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            redirect-uri: ${KAKAO_REDIRECT_URI:http://localhost:8080/login/oauth2/code/kakao}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - profile_image
              - account_email
            client-name: Kakao

        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id

server:
  port: ${SERVER_PORT:8080}

jwt:
  key: ${JWT_SECRET:local-jwt-secret-key-local-jwt-secret-key}
  access-token-name: ${JWT_ACCESS_TOKEN_NAME:ACCESS_TOKEN}
  access-token-ttl: ${JWT_ACCESS_TOKEN_EXPIRE:3600}
  refresh-token-name: ${JWT_REFRESH_TOKEN_NAME:REFRESH_TOKEN}
  refresh-token-ttl: ${JWT_REFRESH_TOKEN_EXPIRE:1209600}

cookie:
  domain: ${COOKIE_DOMAIN:paymemory.site}
oauth2:
  success-redirect-url: ${OAUTH2_SUCCESS_REDIRECT_URL:https://paymemory.site}